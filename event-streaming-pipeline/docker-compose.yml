x-healthcheck-defaults: &healthcheck_defaults
  interval: 10s
  timeout: 5s
  retries: 20
  start_period: 20s

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 >/dev/null 2>&1 || exit 1"]
      <<: *healthcheck_defaults

  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29093:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      <<: *healthcheck_defaults

  kafka2:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "39093:39092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9093,PLAINTEXT_HOST://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9093 --list >/dev/null 2>&1"]
      <<: *healthcheck_defaults

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    ports:
      - "18081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:9092,PLAINTEXT://kafka2:9093
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    command: >
      bash -lc "
      kafka-topics --bootstrap-server kafka1:9092,kafka2:9093 --create --if-not-exists --topic movie-events --partitions 3 --replication-factor 2 --config min.insync.replicas=1;
      kafka-topics --bootstrap-server kafka1:9092,kafka2:9093 --describe --topic movie-events;
      "
    restart: "no"

  schema-init:
    image: alpine:3.20
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schemas:/schemas:ro
    command: >
      sh -lc "apk add --no-cache curl jq &&
      SUBJECT='movie-events-value' &&
      curl -sf -X PUT http://schema-registry:8081/config/$${SUBJECT} -H 'Content-Type: application/vnd.schemaregistry.v1+json' -d '{\"compatibility\":\"BACKWARD\"}' || true &&
      jq -n --arg schema \"$$(jq -c . /schemas/movie-events.avsc)\" '{schemaType:\"AVRO\", schema:$$schema}' > /tmp/payload.json &&
      curl -sf -X POST http://schema-registry:8081/subjects/$${SUBJECT}/versions -H 'Content-Type: application/vnd.schemaregistry.v1+json' --data @/tmp/payload.json"
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./dbs/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password clickhouse --query 'SELECT 1' >/dev/null 2>&1"]
      <<: *healthcheck_defaults

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - ./dbs/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      <<: *healthcheck_defaults

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "19001:9001"
      - "19002:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  producer:
    build:
      context: producer
    env_file:
      - ./producer/.env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    ports:
      - "7070:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  aggregator:
    build:
      context: aggregator
    env_file:
      - ./aggregator/.env
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  grafana:
    image: grafana/grafana:latest
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  integration-tests:
    build:
      context: ./test
    depends_on:
      producer:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      aggregator:
        condition: service_healthy
    environment:
      PRODUCER_URL: http://producer:8000
      AGGREGATOR_URL: http://aggregator:8000
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: analytics
      POSTGRES_DSN: postgresql://analytics:analytics@postgres:5432/analytics
    profiles: ["test"]
