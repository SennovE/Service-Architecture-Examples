port 26379
bind 0.0.0.0
protected-mode no

sentinel monitor cachemaster 172.28.0.10 6379 1
sentinel down-after-milliseconds cachemaster 500
sentinel failover-timeout cachemaster 6000

logfile ""
# Generated by CONFIG REWRITE
latency-tracking-info-percentiles 50 99 99.9
dir "/data"
user default on nopass sanitize-payload ~* &* +@all
sentinel myid 6fb884088e5997bdb1cc649fb4f1e429c5e10ad6
sentinel config-epoch cachemaster 2
sentinel leader-epoch cachemaster 2
sentinel current-epoch 2

sentinel known-replica cachemaster 172.28.0.11 6379

