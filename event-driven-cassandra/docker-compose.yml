x-healthcheck-defaults: &healthcheck_defaults
  interval: 10s
  timeout: 5s
  retries: 20
  start_period: 20s

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 >/dev/null 2>&1 || exit 1"]
      <<: *healthcheck_defaults

  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29093:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      <<: *healthcheck_defaults

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on:
      kafka1:
        condition: service_healthy
    ports:
      - "18081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
    command: >
      bash -lc "

      kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists --topic warehouse-events --partitions 3 --replication-factor 1 --config min.insync.replicas=1;
      kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists --topic warehouse-events-dlq --partitions 3 --replication-factor 1 --config min.insync.replicas=1;

      kafka-topics --bootstrap-server kafka1:9092 --describe --topic warehouse-events;
      kafka-topics --bootstrap-server kafka1:9092 --describe --topic warehouse-events-dlq;
      "
    restart: "no"

  schema-init:
    image: alpine:3.20
    container_name: schema-init
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schemas:/schemas:ro
    command: >
      sh -lc "
      set -e;

      apk add --no-cache curl jq;

      SUBJECT='warehouse-events-value';
      DLQ_SUBJECT='warehouse-events-dlq-value';

      echo 'Setting BACKWARD compatibility for warehouse-events-value';
      curl -sf -X PUT \"http://schema-registry:8081/config/$${SUBJECT}\" -H 'Content-Type: application/vnd.schemaregistry.v1+json' -d '{\"compatibility\":\"BACKWARD\"}';

      echo 'Registering WarehouseEvent V1 schema';
      jq -n --arg schema \"$$(jq -c . /schemas/warehouse-event-v1.avsc)\" '{schemaType:\"AVRO\", schema:$$schema}' > /tmp/warehouse-event-v1.json;

      curl -sf -X POST \"http://schema-registry:8081/subjects/$${SUBJECT}/versions\" -H 'Content-Type: application/vnd.schemaregistry.v1+json' --data @/tmp/warehouse-event-v1.json;

      echo 'Registering WarehouseEvent V2 schema';
      jq -n --arg schema \"$$(jq -c . /schemas/warehouse-event-v2.avsc)\" '{schemaType:\"AVRO\", schema:$$schema}' > /tmp/warehouse-event-v2.json;

      curl -sf -X POST \"http://schema-registry:8081/subjects/$${SUBJECT}/versions\" -H 'Content-Type: application/vnd.schemaregistry.v1+json' --data @/tmp/warehouse-event-v2.json;

      echo 'Setting BACKWARD compatibility for warehouse-events-dlq-value';
      curl -sf -X PUT \"http://schema-registry:8081/config/$${DLQ_SUBJECT}\" -H 'Content-Type: application/vnd.schemaregistry.v1+json' -d '{\"compatibility\":\"BACKWARD\"}';

      echo 'Registering DLQ schema';
      jq -n --arg schema \"$$(jq -c . /schemas/warehouse-dlq-event.avsc)\" '{schemaType:\"AVRO\", schema:$$schema}' > /tmp/warehouse-dlq-event.json;

      curl -sf -X POST \"http://schema-registry:8081/subjects/$${DLQ_SUBJECT}/versions\" -H 'Content-Type: application/vnd.schemaregistry.v1+json' --data @/tmp/warehouse-dlq-event.json;

      echo 'Registered warehouse-events versions:';
      curl -sf \"http://schema-registry:8081/subjects/$${SUBJECT}/versions\";
      echo;

      echo 'Registered DLQ versions:';
      curl -sf \"http://schema-registry:8081/subjects/$${DLQ_SUBJECT}/versions\";
      echo;
      "
    restart: "no"

  kafka-ui:  
    image: provectuslabs/kafka-ui:latest  
    container_name: kafka-ui  
    depends_on:  
      kafka1:  
        condition: service_healthy  
      schema-registry:  
        condition: service_healthy  
    ports:  
      - "8080:8080"  
    environment:  
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092  
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  cassandra-1:
    image: cassandra:5.0
    container_name: cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: WarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'SELECT now() FROM system.local;' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  cassandra-2:
    image: cassandra:5.0
    container_name: cassandra-2
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: WarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_2_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'SELECT now() FROM system.local;' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  cassandra-3:
    image: cassandra:5.0
    container_name: cassandra-3
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: WarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_3_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'SELECT now() FROM system.local;' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  cassandra-init:
    image: cassandra:5.0
    container_name: cassandra-init
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    volumes:
      - ./dbs/cassandra/init.cql:/init.cql:ro
    command: >
      bash -lc "
      set -e;
      export PATH=/opt/cassandra/bin:$$PATH;

      until cqlsh cassandra-1 9042 -e 'SELECT now() FROM system.local;'; do
        echo 'cassandra-1 CQL not ready yet';
        sleep 5;
      done;

      cqlsh cassandra-1 9042 -f /init.cql;
      "
    restart: "no"

  consumer:
    build:
      context: consumer
    container_name: consumer
    env_file:
      - ./consumer/.env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
      cassandra-init:
        condition: service_completed_successfully
    ports:
      - "7070:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health >/dev/null || exit 1"]
      <<: *healthcheck_defaults

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    depends_on:
      consumer:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  cassandra_1_data:
  cassandra_2_data:
  cassandra_3_data:
