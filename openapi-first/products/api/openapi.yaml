openapi: 3.0.3
info:
  title: Marketplace API
  version: 1.0.0

tags:
  - name: Products
  - name: Orders
  - name: PromoCodes

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRequestId:
      name: X-Request-Id
      schema:
        type: string
        format: uuid

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: VALIDATION_ERROR
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnauthorizedAccessToken:
      description: INVALID/EXPIRED ACCESS TOKEN
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    AccessDenied:
      description: ACCESS_DENIED
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ProductNotFound:
      description: PRODUCT_NOT_FOUND
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    OrderNotFound:
      description: ORDER_NOT_FOUND
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    OrderConflict:
      description: CONFLICT
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    PromoCodeUnprocessable:
      description: PROMO_ERRORS
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    UserRole:
      type: string
      enum: [USER, SELLER, ADMIN]

    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE, ARCHIVED]

    OrderStatus:
      type: string
      enum: [CREATED, PAYMENT_PENDING, PAID, SHIPPED, COMPLETED, CANCELED]

    DiscountType:
      type: string
      enum: [PERCENTAGE, FIXED_AMOUNT]

    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - ACCESS_DENIED
        - TOKEN_EXPIRED
        - TOKEN_INVALID
        - REFRESH_TOKEN_INVALID
        - PRODUCT_NOT_FOUND
        - PRODUCT_INACTIVE
        - ORDER_NOT_FOUND
        - ORDER_LIMIT_EXCEEDED
        - ORDER_HAS_ACTIVE
        - INVALID_STATE_TRANSITION
        - INSUFFICIENT_STOCK
        - PROMO_CODE_INVALID
        - PROMO_CODE_MIN_AMOUNT
        - ORDER_OWNERSHIP_VIOLATION

    ErrorResponse:
      type: object
      properties:
        error_code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        details:
          type: object
          nullable: true
          additionalProperties: true
      required: [error_code, message]

    ProductCreate:
      type: object
      required: [name, price, stock, category, status]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 4000
        price:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
          minimum: 0.01
        stock:
          type: integer
          minimum: 0
        category:
          type: string
          minLength: 1
          maxLength: 100
        status:
          $ref: "#/components/schemas/ProductStatus"

    ProductUpdate:
      type: object
      required: [name, price, stock, category, status]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 4000
        price:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
          minimum: 0.01
        stock:
          type: integer
          minimum: 0
        category:
          type: string
          minLength: 1
          maxLength: 100
        status:
          $ref: "#/components/schemas/ProductStatus"

    ProductResponse:
      type: object
      required: [id, name, price, stock, category, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
        stock:
          type: integer
        category:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        seller_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    ProductsPageResponse:
      type: object
      required: [items, totalElements, page, size]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProductResponse"
        totalElements:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 0

    OrderItemCreate:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          maximum: 999

    OrderCreate:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/OrderItemCreate"
        promo_code:
          type: string
          nullable: true
          pattern: "^[A-Z0-9_]{4,20}$"

    OrderUpdate:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/OrderItemCreate"

    OrderItemResponse:
      type: object
      required: [id, product_id, quantity, price_at_order]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
        price_at_order:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal

    OrderResponse:
      type: object
      required: [id, user_id, status, total_amount, discount_amount, items, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_id:
          type: string
          format: uuid
          readOnly: true
        status:
          $ref: "#/components/schemas/OrderStatus"
        promo_code_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        total_amount:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
        discount_amount:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    PromoCodeCreate:
      type: object
      required:
        - code
        - discount_type
        - discount_value
        - min_order_amount
        - max_uses
        - valid_from
        - valid_until
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 20
          pattern: "^[A-Z0-9_]{4,20}$"
        discount_type:
          $ref: "#/components/schemas/DiscountType"
        discount_value:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
          minimum: 0.01
        min_order_amount:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
          minimum: 0
        max_uses:
          type: integer
          minimum: 1
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
        active:
          type: boolean
          default: true

    PromoCodeResponse:
      type: object
      required:
        - id
        - code
        - discount_type
        - discount_value
        - min_order_amount
        - max_uses
        - current_uses
        - valid_from
        - valid_until
        - active
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
        discount_type:
          $ref: "#/components/schemas/DiscountType"
        discount_value:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
        min_order_amount:
          type: number
          format: decimal
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
            name: decimal
        max_uses:
          type: integer
        current_uses:
          type: integer
          minimum: 0
          readOnly: true
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
        active:
          type: boolean


paths:
  /products:
    post:
      tags: [Products]
      operationId: createProduct
      x-required-roles: [SELLER, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          $ref: "#/components/responses/AccessDenied"

    get:
      tags: [Products]
      operationId: listProducts
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProductStatus"
        - name: category
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        "200":
          description: Products list
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsPageResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"

  /products/{id}:
    get:
      tags: [Products]
      operationId: getProductById
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "200":
          description: Product
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "404":
          $ref: "#/components/responses/ProductNotFound"

    put:
      tags: [Products]
      operationId: updateProduct
      x-required-roles: [SELLER, ADMIN]
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ProductNotFound"

    delete:
      tags: [Products]
      operationId: archiveProduct
      x-required-roles: [SELLER, ADMIN]
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "200":
          description: Archived product
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ProductNotFound"

  /orders:
    post:
      tags: [Orders]
      operationId: createOrder
      x-required-roles: [USER, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          $ref: "#/components/responses/AccessDenied"
        "404":
          $ref: "#/components/responses/ProductNotFound"
        "409":
          $ref: "#/components/responses/OrderConflict"
        "422":
          $ref: "#/components/responses/PromoCodeUnprocessable"

  /orders/{id}:
    get:
      tags: [Orders]
      operationId: getOrderById
      x-required-roles: [USER, ADMIN]
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "200":
          description: Order
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          description: ORDER_OWNERSHIP_VIOLATION
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/OrderNotFound"

    put:
      tags: [Orders]
      operationId: updateOrder
      x-required-roles: [USER, ADMIN]
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          description: ORDER_OWNERSHIP_VIOLATION
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/OrderNotFound"
        "409":
          $ref: "#/components/responses/OrderConflict"
        "422":
          $ref: "#/components/responses/PromoCodeUnprocessable"

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      operationId: cancelOrder
      x-required-roles: [USER, ADMIN]
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "204":
          description: Canceled
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          description: ORDER_OWNERSHIP_VIOLATION
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/OrderNotFound"
        "409":
          $ref: "#/components/responses/OrderConflict"

  /promo-codes:
    post:
      tags: [PromoCodes]
      operationId: createPromoCode
      x-required-roles: [SELLER, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoCodeCreate"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoCodeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedAccessToken"
        "403":
          $ref: "#/components/responses/AccessDenied"
